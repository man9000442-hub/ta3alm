{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "تعديل المجموعة" %}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning">
                    <h5 class="mb-0 fw-bold">{% trans "تعديل بيانات المجموعة" %}</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                        </div>
                        {% endfor %}
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary">{% trans "إلغاء" %}</a>
                            <button type="submit" class="btn btn-success px-4">{% trans "حفظ التعديلات" %}</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
